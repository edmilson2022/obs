<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mk Fortaleza - Painel</title>

<style>

*{
    box-sizing:border-box;
    font-family:sans-serif;
}

body{
    background:#1e1e1e;
    color:#fff;
    padding:20px;
    margin:0;
}

.header-container{
    max-width:600px;
    margin:0 auto 15px auto;
    text-align:center;
}

.header-logo{
    max-height:80px;
    display:block;
    margin:20px auto 10px auto;
}

.main-title{
    font-size:38px;
    font-family:'Arial Black','Impact',sans-serif;
    text-transform:uppercase;
    font-style:italic;
    letter-spacing:2px;
    margin:0 0 15px 0;

    background:linear-gradient(
        135deg,
        #1c62be,
        #cc1111,
        #e6a900,
        #1c62be
    );

    background-size:300% 300%;

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    animation:title-gradient 8s ease-in-out infinite;
}

@keyframes title-gradient{

    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }
}

.panel{
    max-width:600px;
    margin:0 auto;
    background:#2d2d2d;
    padding:20px;
    border-radius:8px;
    border:1px solid #444;
}

h2{
    margin-top:0;
    color:#7cb0f7;
    border-bottom:1px solid #444;
    padding-bottom:10px;
}

.theme-selector{
    background:#222;
    padding:12px;
    border-radius:6px;
    margin-bottom:20px;
    border:1px dashed #555;
}

select{
    width:100%;
    background:#1a1a1a;
    color:#fff;
    border:1px solid #666;
    padding:8px;
    border-radius:4px;
    font-weight:bold;
}

.row{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
}

.col{
    width:44%;
}

.col-center{
    width:12%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

label{
    display:block;
    font-size:11px;
    text-transform:uppercase;
    color:#aaa;
    margin-bottom:5px;
}

input{
    width:100%;
    background:#1a1a1a;
    border:1px solid #555;
    color:#fff;
    padding:8px;
    font-size:14px;
    border-radius:4px;
}

input[type="number"]{
    font-size:24px;
    text-align:center;
    font-weight:bold;
    margin-top:5px;
}

.btn-group{
    display:flex;
    justify-content:space-between;
    margin-top:5px;
}

button{
    flex:1;
    margin:2px;
    padding:10px;
    font-weight:bold;
    border:none;
    border-radius:4px;
    cursor:pointer;
    background:#444;
    color:#fff;
    font-size:16px;
}

button:hover{
    background:#555;
}

button.plus{
    background:#104494;
}

button.plus:hover{
    background:#1c62be;
}

button.reset{
    background:#c62828;
    width:100%;
    margin-top:15px;
    padding:12px;
    font-size:14px;
    text-transform:uppercase;
}

button.reset:hover{
    background:#b71c1c;
}

.status{
    text-align:center;
    margin-top:15px;
    color:#7cb0f7;
    font-size:13px;
}

</style>
</head>

<body>

<div class="header-container">

<img
class="header-logo"
src="https://cdn2.steamgriddb.com/logo/22cdeda97afa215e6098c8f6abae58b6.png"
>

<h1 class="main-title">
MK Fortaleza
</h1>

</div>

<div class="panel">

<h2>Controle do Placar</h2>

<div class="theme-selector">

<label>
🎨 Escolha o Tema Visível no OBS:
</label>

<select id="theme_select" onchange="salvar()">

<option value="theme-blue">
🔵 Classic Blue
</option>

<option value="theme-red">
🔴 Burn Red
</option>

<option value="theme-green">
🟢 Acid Green
</option>

<option value="theme-gold">
🟡 Gold Edition
</option>

<option value="theme-dark">
⚫ Dark Mode
</option>

</select>

</div>

<div class="row">

<div class="col">

<label>Jogador 1</label>

<input
type="text"
id="p1_name"
value="TITAN"
oninput="salvar()"
>

<input
type="number"
id="p1_score"
value="0"
readonly
>

<div class="btn-group">

<button onclick="alterar('p1_score',-1)">
-1
</button>

<button
class="plus"
onclick="alterar('p1_score',1)"
>
+1
</button>

</div>

</div>

<div class="col-center">

<label>FT</label>

<input
type="text"
id="match_type"
value="FT10"
oninput="salvar()"
style="text-align:center;font-weight:bold;"
>

</div>

<div class="col">

<label>Jogador 2</label>

<input
type="text"
id="p2_name"
value="PIERO"
oninput="salvar()"
>

<input
type="number"
id="p2_score"
value="0"
readonly
>

<div class="btn-group">

<button onclick="alterar('p2_score',-1)">
-1
</button>

<button
class="plus"
onclick="alterar('p2_score',1)"
>
+1
</button>

</div>

</div>

</div>

<button class="reset" onclick="zerar()">
ZERAR PLACAR
</button>

<div class="status" id="status">
Conectando ao Baserow...
</div>

</div>

<script>

const TOKEN =
"EAnPNz3xvkThFwMRoTjcrIWjXaKQ0V15";

const API =
"https://api.baserow.io/api/database/rows/table/467844/1/?user_field_names=true";

async function salvar(){

    const dados = {

        nome_player1:
            document.getElementById('p1_name').value,

        placarplayer1:
            parseInt(document.getElementById('p1_score').value),

        ft:
            document.getElementById('match_type').value,

        placarplayer2:
            parseInt(document.getElementById('p2_score').value),

        nome_player2:
            document.getElementById('p2_name').value,

        tema:
            document.getElementById('theme_select').value
    };

    try{

        const resposta = await fetch(API,{

            method:"PATCH",

            headers:{
                "Authorization":"Token " + TOKEN,
                "Content-Type":"application/json"
            },

            body:JSON.stringify(dados)
        });

        if(resposta.ok){

            document.getElementById('status').innerHTML =
            "✅ Dados enviados ao Baserow";

        }else{

            document.getElementById('status').innerHTML =
            "❌ Erro ao salvar";
        }

    }catch(erro){

        console.log(erro);

        document.getElementById('status').innerHTML =
        "❌ Falha conexão/API";
    }
}

function alterar(id,valor){

    let campo =
        document.getElementById(id);

    let matchTypeStr =
        document.getElementById('match_type').value;

    let ftLimit =
        parseInt(matchTypeStr.replace(/\D/g,'')) || 999;

    let atual =
        parseInt(campo.value) || 0;

    atual += valor;

    if(atual < 0) atual = 0;

    if(atual > ftLimit) atual = ftLimit;

    campo.value = atual;

    salvar();
}

function zerar(){

    document.getElementById('p1_score').value = 0;

    document.getElementById('p2_score').value = 0;

    salvar();
}

</script>

</body>
</html>
